# TUM RGB-D dataset settings for ORB-SLAM3 RGB-D mode.
dataset: tum_rgbd
sequence: freiburg1_xyz

camera:
  # Freiburg1 RGB camera intrinsics (640x480)
  fx: 517.306408
  fy: 516.469215
  cx: 318.643040
  cy: 255.313989
  width: 640
  height: 480
  depth_scale: 5000.0  # TUM depth PNGs are 16-bit, divide by 5000 for meters

orb_slam3:
  vocabulary: third_party/ORB_SLAM3/Vocabulary/ORBvoc.txt
  settings: third_party/ORB_SLAM3/Examples/RGB-D/TUM1.yaml
  executable: third_party/ORB_SLAM3/Examples/RGB-D/rgbd_tum
